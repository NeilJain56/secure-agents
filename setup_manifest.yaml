# Setup Manifest - Declarative requirements for tools and providers.
#
# The setup script reads agent configs from config.yaml to determine which
# tools and providers each agent needs, then consults THIS file to determine
# what must be installed, configured, and authenticated.
#
# To add a new agent: just add it to config.yaml with its tools list.
# To add a new tool/provider type: add an entry here.

tools:
  email_reader:
    credentials:
      - key: email_password
        label: "Gmail App Password (16-char code from myaccount.google.com/apppasswords)"
        condition: "auth_method == app_password"
        hide_input: true
      - key: oauth2
        label: "Gmail OAuth2 authorization (opens browser)"
        condition: "auth_method == oauth2"
        flow: gmail_oauth2
    config_required:
      - path: defaults.email.imap.username
        prompt: "Gmail address for receiving email (IMAP)"
        sentinel: "your-email@gmail.com"

  email_sender:
    # Same credentials as email_reader -- deduplication handled automatically
    credentials:
      - key: email_password
        condition: "auth_method == app_password"
        hide_input: true
      - key: oauth2
        label: "Gmail OAuth2 authorization (opens browser)"
        condition: "auth_method == oauth2"
        flow: gmail_oauth2
    config_required:
      - path: defaults.email.smtp.username
        prompt: "Gmail address for sending email (SMTP)"
        sentinel: "your-email@gmail.com"

  document_parser:
    credentials: []

  file_storage:
    credentials: []
    directories:
      - output

providers:
  # Every provider in this section MUST be local-only.
  # The builder enforces local_only=True at runtime.
  ollama:
    homebrew:
      - ollama
    post_install:
      - action: start_service
        service: ollama
        check_url: "http://localhost:11434/api/tags"
      - action: pull_model
        model_key: provider.ollama.model
        default: llama3.2
    credentials: []

  llamacpp:
    # llama.cpp server is started by the user; we just verify it.
    credentials: []

  vllm:
    # vLLM is started by the user; we just verify it.
    credentials: []

  lmstudio:
    # LM Studio is started by the user; we just verify it.
    credentials: []

  localai:
    # LocalAI is started by the user; we just verify it.
    credentials: []

# Always created regardless of agent selection
common:
  directories:
    - data
    - logs
    - temp
  pip_extras:
    - gmail-oauth  # needed for OAuth2 email flow
