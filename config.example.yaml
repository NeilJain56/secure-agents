# Secure Agents Configuration
# Copy this file to config.yaml and update with your settings.
#
# IMPORTANT: Credentials (passwords, API keys) are NEVER stored in this file.
# They are resolved from the configured credential backend (see `credentials`
# section below) and fall back to environment variables as a per-secret
# override. Run `secure-agents auth setup` to configure credentials securely.
#
# SECURITY: Only local LLM inference is supported. Any provider you choose must
# declare local_only=True; the builder rejects anything else. Supported providers
# out of the box: ollama, llamacpp, vllm, lmstudio, localai (and the generic
# openai_compat for any OpenAI-compatible local server). No data leaves your
# machine.

# ─── Defaults ────────────────────────────────────────────────────────────────
# Shared fallback values inherited by all agents.
# Any agent can override any value here in its own section below.
defaults:
  email:
    imap:
      host: imap.gmail.com
      port: 993
      username: your-email@gmail.com
      auth_method: app_password  # "oauth2" or "app_password"
      # SSL is always enforced. To disable (NOT RECOMMENDED):
      # allow_insecure_connections: true
    smtp:
      host: smtp.gmail.com
      port: 587
      username: your-email@gmail.com
      auth_method: app_password
      # TLS is always enforced. To disable (NOT RECOMMENDED):
      # allow_insecure_connections: true

  security:
    max_file_size_mb: 50
    allowed_file_types: [.pdf, .docx, .doc]
    sandbox_enabled: true          # Parse documents inside Docker (recommended)
    audit_log_path: ./logs/audit.log
    temp_dir: ./temp
    auto_cleanup: true

  storage:
    output_dir: ./output
    retention_days: 90

# ─── LLM Provider ──────────────────────────────────────────────────────────
# Pick whichever local backend you want by setting `active`. Only providers
# with local_only=True can be used; the builder rejects anything else.
#
# Built-in providers: ollama, llamacpp, vllm, lmstudio, localai, openai_compat
provider:
  active: ollama

  ollama:
    host: http://localhost:11434
    model: llama3.2
    temperature: 0.1

  # llama.cpp server (./server -m model.gguf)
  llamacpp:
    host: http://localhost:8080
    model: default       # llama.cpp loads its model at server startup
    temperature: 0.1

  # vLLM (vllm serve <model>)
  vllm:
    host: http://localhost:8000
    model: meta-llama/Llama-3.2-3B-Instruct
    temperature: 0.1

  # LM Studio local server
  lmstudio:
    host: http://localhost:1234
    model: lmstudio-community/Llama-3.2-3B-Instruct-GGUF
    temperature: 0.1

  # LocalAI
  localai:
    host: http://localhost:8080
    model: llama-3.2-3b-instruct
    temperature: 0.1

# ─── Validator LLM ─────────────────────────────────────────────────────────
# Secondary screening pass over untrusted input (defense layer 2). Set
# `skip: true` to bypass for an agent (e.g. in tests). The validator uses the
# active provider unless an `override` is specified here.
validator:
  skip: false
  confidence_threshold: 0.7
  # override: ollama
  # model: llama3.2

# ─── Concurrency ────────────────────────────────────────────────────────────
# Maximum number of agent threads running simultaneously.
max_workers: 4

# ─── Job Queue (multi-agent sequencing) ──────────────────────────────────────
# A shared SQLite-backed queue that agents use to hand work to each other.
# Agent A calls `self.emit("agent_b", {...})` — the payload appears in B's
# queue as a pending job.  The builder wires one queue instance to every
# agent automatically.
queue:
  db_path: ./data/jobs.db
  max_retries: 3
  retry_delay_seconds: 60

# ─── Credential Backend ──────────────────────────────────────────────────────
# Where secrets (email passwords, OAuth2 client_secrets, API tokens) live.
# Environment variables are ALWAYS consulted as a per-secret fallback.
#
# Backends:
#   auto           — macOS Keychain when available, otherwise encrypted file.
#                    The right default for laptops + VMs out of the box.
#   keychain       — macOS Keychain only. Fails if not on macOS.
#   encrypted_file — AES-256-GCM encrypted JSON file under `store_path`,
#                    unlocked with a master passphrase from
#                    SECURE_AGENTS_MASTER_KEY or an interactive prompt.
#                    Recommended for Linux VMs and headless servers.
#
# To initialize an encrypted store on a fresh VM:
#     secure-agents auth init-store
#     export SECURE_AGENTS_MASTER_KEY='your-strong-passphrase'
#     secure-agents auth setup
credentials:
  backend: auto
  store_path: ~/.secure-agents/credentials.enc

# ─── Agents ──────────────────────────────────────────────────────────────────
# Each agent has its own self-contained config section.
# Values here are merged ON TOP of `defaults` above -- agents inherit
# everything from defaults and can override whatever they need.
#
# To add a new agent: just add a new entry here with enabled: true.
# To disable an agent: set enabled: false.
# To run only specific agents: secure-agents start agent1 agent2
agents:
  nda_reviewer:
    enabled: true
    poll_interval_seconds: 60
    concurrency_limit: 1
    tools:
      - email_reader
      - email_sender
      - document_parser
      - file_storage
    # Triggers: optional cron or file-watch triggers
    # triggers:
    #   - type: cron
    #     interval: "every 5m"
    #   - type: file_watch
    #     path: ./inbox
    #     patterns: ["*.pdf", "*.docx"]
    # This agent inherits all defaults as-is. No overrides needed.

  # ── Example: a different agent with different settings ──────────────────
  # contract_analyzer:
  #   enabled: true
  #   poll_interval_seconds: 120
  #   tools:
  #     - email_reader
  #     - document_parser
  #     - file_storage
  #   # Override defaults for THIS agent only:
  #   security:
  #     max_file_size_mb: 200            # Contracts can be large
  #     allowed_file_types: [.pdf]       # Only PDFs
  #   storage:
  #     output_dir: ./output/contracts   # Separate output directory
  #     retention_days: 365              # Keep for a year
  #   # Use a different local provider just for this agent:
  #   provider:
  #     override: llamacpp               # Any registered local_only provider
  #     model: default
  #     temperature: 0.0

  # ── Document Sorting & Dedup Pipeline ────────────────────────────────────
  # Sorts files from source_folder into 3 categories (NDA, MSA-company,
  # MSA-thirdparty), then deduplicates each category.
  #
  # Run with:  secure-agents start doc_sorter
  # The sorter automatically emits jobs to the 3 dedup agents.
  doc_sorter:
    enabled: true
    source_folder: /path/to/unsorted/files    # ← CHANGE THIS
    output_root: ./ai_generated
    tools:
      - text_extractor
      - file_manager

  nda_deduplicator:
    enabled: true
    output_root: ./ai_generated
    tools:
      - text_extractor
      - file_manager

  msa_company_deduplicator:
    enabled: true
    output_root: ./ai_generated
    tools:
      - text_extractor
      - file_manager

  msa_thirdparty_deduplicator:
    enabled: true
    output_root: ./ai_generated
    tools:
      - text_extractor
      - file_manager

# ─── Pipelines ───────────────────────────────────────────────────────────────
# A pipeline groups multiple agents into a single named unit.
# In the CLI:   secure-agents start doc_sort_pipeline
# In the UI:    appears as one tile with a single Run/Stop button
#
# Pipelines are purely organizational — agents still communicate through
# the shared job queue (doc_sorter emits jobs to the 3 dedup agents).
pipelines:
  doc_sort_pipeline:
    description: Sort and deduplicate legal documents (NDA, MSA company, MSA third-party)
    agents:
      - doc_sorter
      - nda_deduplicator
      - msa_company_deduplicator
      - msa_thirdparty_deduplicator
